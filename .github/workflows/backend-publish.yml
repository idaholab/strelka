name: backend-publish

on:
  push:
    branches:
      - malcolm-build
  workflow_dispatch:
  repository_dispatch:

jobs:
  docker:
    uses: ./.github/workflows/docker-publish.yml
    with:
      service: backend
      dockerfile: ./build/python/backend/Dockerfile
      extra_build_args: |
        SURICATA_INTEGRATION=0
        ZEEK_INTEGRATION=0
